<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学園町会&nbsp;カレンダー</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
    <h2><span class="plan">学園町会&nbsp;カレンダー</span></h2>
    <h3><span style="color:green;">令和8年（2026年）</span></h3>
    <div id="event-list">
    </div>    
    <p>&emsp;</p>
    <p>&emsp;</p>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // HTMLがすべて読み込まれて、準備が整ったら実行する
        $(function() {
            
            // データの流し込み先（箱）をjQueryで取得して変数に入れておく
            const $container = $('#event-list');
            
            // 最初に箱の中身を念のため空っぽにする
            $container.empty();

            // 同じフォルダにある 'events.json' を読み込む（非同期通信）
            $.getJSON('events.json', function(data) {
                
                // 読み込みが成功した場合、データの数だけ1件ずつループ処理
                $.each(data, function(index, event) {
                    
                    // まず、行事の上に区切り線（<hr>）を追加
                    $container.append('<hr>');

                    // 💡 安全対策＆undefined対策のデータ準備
                    const dateText    = event.date || '';
                    const titleText   = event.title || '';
                    // 備考がある場合のみ「（備考）」の形にする（無ければ空文字）
                    const remarksText = event.remarks ? '（' + event.remarks + '）' : '';

                    // 1. 新しい段落（<p>）の部品を安全に作成する
                    const $p = $('<p>');

                    // 2. 終了した行事（isPast が true）かどうかの条件分岐
                    if (event.isPast) {
                        // 過去の行事：class="past" をつけ、チェックマーク画像を入れる
                        $p.addClass('past');
                        
                        // 画像タグを追加
                        $p.append('<img src="images/checkmark.svg"> ');
                        
                        // 💡 文字列の部分は .text() を使わず、安全な専用のテキストノードとして追加する
                        // （こうすることで、文字の中の <p> や <script> が完全にただの文字になります）
                        $p.append(document.createTextNode(dateText + ' ' + titleText + ' ' + remarksText));
                    } else {
                        // 今後の行事：class="plan" をつける
                        $p.addClass('plan');
                        
                        // 💡 文字列の部分を安全に追加
                        $p.append(document.createTextNode(dateText + ' ' + titleText + ' ' + remarksText));
                    }

                    // 3. 組み立てた安全な部品を、画面の箱に追加する
                    $container.append($p);
                });

            }).fail(function() {
                // 万が一、JSONファイルの読み込みに失敗した場合のエラー表示
                // （ここは固定の文字なので .html() のままで安全です）
                $container.html('<p style="color: red;">行事予定の読み込みに失敗しました。</p>');
            });

        });
    </script>
    <script>
        // ブラウザがPWAに対応しているかチェックして、対応していれば裏方（sw.js）を起動する
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(function() { console.log('PWA ServiceWorker 登録成功！'); })
                .catch(function(err) { console.error('PWA 登録失敗:', err); });
        }
    </script>
</body>
</html>
