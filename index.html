<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学園町会&nbsp;カレンダー</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link href="style.css" rel="stylesheet" />
    <style>
        /* 💡 上部固定ヘッダーのスタイル */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #2e7d32; /* 🟢 ヘッダーの背景色（お好みの色に変えられます） */
            /* color: white; */
            padding: 10px 15px;
            box-sizing: border-box;
            z-index: 1000; /* 最前面に表示 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-title h2 {
            margin: 0;
            font-size: 18px;
            color: white;
        }
        
        .header-title h3 {
            margin: 2px 0 0 0;
            font-size: 13px;
            color: white;
            opacity: 0.9;
        }

        /* 💡 管理画面へのリンクボタンのスタイル */
        .admin-link-btn {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }
        .admin-link-btn:active {
            background-color: rgba(255, 255, 255, 0.4);
        }

        /* 💡 メインコンテンツ領域（ヘッダーに被らないように上部余白を空ける） */
        body {
            margin: 0;
            padding-top: 75px; /* ヘッダーの高さ分だけ下にずらす */
            font-family: sans-serif;
        }
        
        #event-list {
            padding: 10px 15px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <h2>学園町会 カレンダー</h2>
            <h3><span id="year-display"></span></h3>
        </div>
        <button id="admin-btn" class="admin-link-btn">追加・削除</button>
    </header>

    <div id="event-list">
    </div>    
    <p>&emsp;</p>
    <p>&emsp;</p>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // 日付のデータを取得
        const today = new Date();
        const year = today.getFullYear(); // 西暦を取得
        
        // 和暦に変換する計算式（令和・平成対応）
        let era = "";
        let eraYear = 0;

        if (year >= 2019) {
        era = "令和";
        eraYear = year - 2018;
        } else if (year >= 1989) {
        era = "平成";
        eraYear = year - 1988;
        }

        // 「1年」の場合は「元年」にする
        const displayYear = (eraYear === 1) ? "元" : eraYear;

        // 画面に表示するテキストを作る (例: 2026年(令和8年))
        const resultText = `${year}年（${era}${displayYear}年）`;

        // id="year-display" の場所にテキストを入れる
        document.getElementById("year-display").textContent = resultText;
    </script>
    <script>
        $(function() {
            
            // 💡 4桁のPINコード（パスワード）の設定
            // ※「1234」の部分を、お好きな4桁の数字に書き換えてください。
            const ADMIN_PIN = "1234"; 

            // 💡 管理者用ボタンが押された時の処理
            $('#admin-btn').on('click', function() {
                const userInput = prompt("パスワード（4桁の数字）を入力してください：");
                
                if (userInput === null) {
                    return; // キャンセルされた場合は何もしない
                }
                
                if (userInput === ADMIN_PIN) {
                    // PINが一致したら管理画面へ移動
                    window.location.href = 'admin.html';
                } else {
                    alert("パスワードが違います。");
                }
            });

            const $container = $('#event-list');
            $container.empty();

            // 同じフォルダにある 'events.json' を読み込む
            $.getJSON('events.json', function(data) {
                $.each(data, function(index, event) {
                    $container.append('<hr>');

                    const dateText    = event.date || '';
                    const titleText   = event.title || '';
                    const remarksText = event.remarks ? '（' + event.remarks + '）' : '';

                    const $p = $('<p>');

                    if (event.isPast) {
                        $p.addClass('past');
                        $p.append('<img src="images/checkmark.svg"> ');
                        $p.append(document.createTextNode(dateText + ' ' + titleText + ' ' + remarksText));
                    } else {
                        $p.addClass('plan');
                        $p.append(document.createTextNode(dateText + ' ' + titleText + ' ' + remarksText));
                    }

                    $container.append($p);
                });

            }).fail(function() {
                $container.html('<p style="color: red;">行事予定の読み込みに失敗しました。</p>');
            });

            // PWA ServiceWorkerの登録
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(function() { console.log('PWA ServiceWorker 登録成功！'); })
                    .catch(function(err) { console.error('PWA 登録失敗:', err); });
            }
        });
    </script>
</body>
</html>
