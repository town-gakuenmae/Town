<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【管理画面】行事予定の追加</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; background: #f5f5f5; }
        h1 { font-size: 20px; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"] { width: 100%; padding: 8px; box-sizing: border-box; font-size: 16px; }
        .checkbox-label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
        #status { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <h1>行事予定の追加（スマホ用）</h1>

    <div class="form-group">
        <label for="github-token">管理用パスワード (GitHub Token)</label>
        <input type="password" id="github-token" placeholder="github_pat_...を入力">
    </div>

    <div class="form-group">
        <label for="event-date">日付・時間</label>
        <input type="text" id="event-date" placeholder="例：9月1日（火）10:00〜">
    </div>

    <div class="form-group">
        <label for="event-title">行事名</label>
        <input type="text" id="event-title" placeholder="例：町会主催防災訓練">
    </div>

    <div class="form-group">
        <label class="checkbox-label">
            <input type="checkbox" id="event-past"> 終了した行事にする（チェックマーク付与）
        </label>
    </div>

    <button id="save-btn">この行事を追加する</button>

    <div id="status"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        // 設定項目（トークンは空に）
        const REPO_OWNER   = 'town-gakuenmae';
        const REPO_NAME    = 'Town';
        const FILE_PATH    = 'events.json';

        $(function() {
            // スマホのブラウザに、一度入力したトークンを記憶させる機能（毎回打つのが大変なため）
            if (localStorage.getItem('saved_token')) {
                $('#github-token').val(localStorage.getItem('saved_token'));
            }

            $('#save-btn').on('click', async function() {
                // 💡 画面の入力欄からトークンを取得する
                const token = $('#github-token').val().trim();
                const date = $('#event-date').val().trim();
                const title = $('#event-title').val().trim();
                const isPast = $('#event-past').prop('checked');

                if (!token || !date || !title) {
                    showStatus('パスワード、日付、行事名を入力してください。', 'error');
                    return;
                }

                // 入力されたトークンをスマホに記憶させる
                localStorage.setItem('saved_token', token);

                $('#save-btn').prop('disabled', true).text('送信中...');
                showStatus('GitHubにデータを保存しています...', '');

                try {
                    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
                    
                    const res = await $.ajax({
                        url: url,
                        method: 'GET',
                        headers: { 'Authorization': `token ${token}` } // 💡 入力されたトークンを使用
                    });

                    const currentJson = decodeURIComponent(escape(atob(res.content)));
                    const eventList = JSON.parse(currentJson);

                    eventList.push({ date: date, title: title, isPast: isPast });

                    const newJsonStr = JSON.stringify(eventList, null, 2);
                    const b64Content = btoa(unescape(encodeURIComponent(newJsonStr)));

                    await $.ajax({
                        url: url,
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`, // 💡 入力されたトークンを使用
                            'Content-Type': 'application/json'
                        },
                        data: JSON.stringify({
                            message: '行事予定を追加（スマホアプリより）',
                            content: b64Content,
                            sha: res.sha
                        })
                    });

                    showStatus('保存が完了しました！数分以内にサイトへ反映されます。', 'success');
                    $('#event-date').val('');
                    $('#event-title').val('');
                    $('#event-past').prop('checked', false);

                } catch (error) {
                    console.error(error);
                    showStatus('エラーが発生しました。パスワード（トークン）が正しいか確認してください。', 'error');
                } finally {
                    $('#save-btn').prop('disabled', false).text('この行事をついかする');
                }
            });

            function showStatus(msg, type) {
                $('#status').text(msg).removeClass().addClass(type).fadeIn();
            }
        });
    </script>
</body>
</html>
